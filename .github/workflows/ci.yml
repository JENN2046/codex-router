name: Codex Router CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, ready_for_review]
permissions:
  contents: read

jobs:
  typecheck:
    name: TypeCheck (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  build:
    name: Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    name: Cross-platform Acceptance (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        node: [20, 22]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:package-consumer

  governance-coverage:
    name: Governance Branch Coverage (Node 22)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:governance-coverage
      - run: npm run test:governance-properties

  state-sync:
    name: State Sync Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Resolve State Sync Audit gate
        id: state-sync-gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "run_audit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from "node:fs";

          const claim = JSON.parse(
            readFileSync("docs/current/state-sync-record.json", "utf8")
          );
          const v1MainPushed =
            claim?.subject?.branch === "main"
            && claim?.subject?.upstream === "refs/remotes/origin/main"
            && claim?.transition?.kind === "state_only_pushed";
          const v2StateSyncRecord =
            claim?.schemaVersion === 2
            || claim?.policyVersion === "state-sync-policy.v2";
          const runAudit = v1MainPushed || v2StateSyncRecord;

          appendFileSync(
            process.env.GITHUB_OUTPUT,
            `run_audit=${runAudit ? "true" : "false"}\n`
          );

          if (!runAudit) {
            console.log(
              "State Sync Audit is gated on push until a v2 state-sync-policy record or legacy v1 main/state_only_pushed fallback record exists."
            );
          }
          NODE
      - run: npm ci
        if: steps.state-sync-gate.outputs.run_audit == 'true'
      - run: npm run governance -- audit state-sync
        if: steps.state-sync-gate.outputs.run_audit == 'true'

  execution-boundary:
    name: Execution Boundary Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run governance -- audit execution-boundary-current-surface

  canary:
    name: Canary (${{ matrix.risk }}, Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        node: [20, 22]
        risk: [low, medium]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run canary -- --risk ${{ matrix.risk }}
      - name: Preserve node-scoped canary evidence
        if: always()
        run: |
          if [ -f "docs/evidence/codex-cli-canary-${{ matrix.risk }}-latest.json" ]; then
            cp \
              "docs/evidence/codex-cli-canary-${{ matrix.risk }}-latest.json" \
              "docs/evidence/codex-cli-canary-node${{ matrix.node }}-${{ matrix.risk }}-latest.json"
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: canary-evidence-node${{ matrix.node }}-${{ matrix.risk }}
          path: |
            docs/evidence/codex-cli-canary-node${{ matrix.node }}-${{ matrix.risk }}-latest.json
            docs/evidence/codex-cli-canary-latest.json

  smoke-contract:
    name: Smoke Contract (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run smoke:contract
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: smoke-contract-evidence-node${{ matrix.node }}
          path: docs/evidence/codex-cli-contract-smoke-latest.json

  # smoke-cli requires Codex CLI binary to be installed on the runner,
  # which is not available on GitHub Actions. Smoke tests are run locally
  # via `npm run smoke:telemetry` and `npm run smoke:workspace-write:telemetry`.
  #
  # smoke-cli:
  #   name: Smoke CLI (Node ${{ matrix.node }})
  #   ...

  evidence:
    name: Evidence Collection
    runs-on: ubuntu-latest
    needs: [canary, smoke-contract, state-sync, execution-boundary]
    if: always()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download canary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: "*-evidence-*"
          path: docs/evidence/
          merge-multiple: true
        continue-on-error: true
      - run: npm run evidence:collect
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: evidence-manifest
          path: docs/evidence/manifest-latest.json
