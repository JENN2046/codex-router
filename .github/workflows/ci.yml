name: Codex Router CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeCheck (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  build:
    name: Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  canary:
    name: Canary (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        node: [20, 22]
        risk: [low, medium]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run canary -- --risk ${{ matrix.risk }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: canary-evidence-node${{ matrix.node }}-${{ matrix.risk }}
          path: docs/evidence/codex-cli-canary-latest.json

  smoke-cli:
    name: Smoke CLI (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true  # Requires Codex CLI binary, not available in CI
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run smoke:telemetry

  evidence:
    name: Evidence Collection
    runs-on: ubuntu-latest
    needs: [canary, smoke-cli]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download canary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: canary-evidence-*
          path: docs/evidence/
          merge-multiple: true
        continue-on-error: true
      - run: npm run evidence:collect
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-manifest
          path: docs/evidence/manifest-latest.json
