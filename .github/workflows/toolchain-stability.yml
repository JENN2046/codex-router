name: Node 22 Patch Stability Stage 1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - .github/workflows/toolchain-stability.yml
      - package.json
      - package-lock.json
      - tsconfig.json
      - scripts/run-toolchain-stability-experiment.ts
      - tests/toolchain-stability-experiment.test.ts

permissions:
  contents: read

jobs:
  compile-stability:
    name: Compile Stability (${{ matrix.label }})
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Node 20.20.2 control, TS 5.9.3, default stack
            node: "20.20.2"
            compiler: typescript-5-9
          - label: Node 20.20.2 control, TS 6.0.3, default stack
            node: "20.20.2"
            compiler: typescript
          - label: Node 22.23.1 baseline, TS 5.9.3, default stack
            node: "22.23.1"
            compiler: typescript-5-9
          - label: Node 22.23.1 baseline, TS 6.0.3, default stack
            node: "22.23.1"
            compiler: typescript
          - label: Node 22.23.0 candidate, TS 5.9.3, default stack
            node: "22.23.0"
            compiler: typescript-5-9
          - label: Node 22.23.0 candidate, TS 6.0.3, default stack
            node: "22.23.0"
            compiler: typescript
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Sample twenty independent compiles
        run: >-
          npm run experiment:toolchain-stability --
          --compiler ${{ matrix.compiler }}
          --iterations 20
          --expected-node-version ${{ matrix.node }}
          --expected-head-sha ${{ github.event.pull_request.head.sha }}
