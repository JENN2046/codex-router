name: TypeScript Toolchain Stability

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - .github/workflows/toolchain-stability.yml
      - package.json
      - package-lock.json
      - tsconfig.json
      - scripts/run-toolchain-stability-experiment.ts
      - tests/toolchain-stability-experiment.test.ts

permissions:
  contents: read

jobs:
  compile-stability:
    name: Compile Stability (${{ matrix.label }})
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Node 20, TS 5.9.3, default stack
            node: 20
            compiler: typescript-5-9
            stack-size-kb: default
          - label: Node 20, TS 6.0.3, default stack
            node: 20
            compiler: typescript
            stack-size-kb: default
          - label: Node 22, TS 5.9.3, default stack
            node: 22
            compiler: typescript-5-9
            stack-size-kb: default
          - label: Node 22, TS 6.0.3, default stack
            node: 22
            compiler: typescript
            stack-size-kb: default
          - label: Node 22, TS 6.0.3, 8192 KiB stack
            node: 22
            compiler: typescript
            stack-size-kb: "8192"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Sample twenty independent compiles
        run: >-
          npm run experiment:toolchain-stability --
          --compiler ${{ matrix.compiler }}
          --iterations 20
          --stack-size-kb ${{ matrix['stack-size-kb'] }}
